on:
  pull_request:
    branches:
      - init
    types:
      - closed
env:
  REPO_NAME: psyrenq/itm350-river-bb

jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Echo PR merge status
        run: echo "The PR was merged."

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: List directory structure
        run: ls -R .

      - name: Install dependencies
        working-directory: ./node-bulletin-board/bulletin-board-app
        run: npm install

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REPO_NAME }}
          tags: |
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./node-bulletin-board/bulletin-board-app
          file: ./node-bulletin-board/bulletin-board-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

